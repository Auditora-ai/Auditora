<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <!-- Concept 5: Minimal Score Arc
       A semicircle/gauge that shows a score — like a speedometer.
       The needle points to "good" zone.
       Inside: the letter A.
       Meaning: we MEASURE your readiness. We give you a SCORE.
       This is the most direct representation of what the CEO sees:
       "Your team has 72% procedural alignment" -->
  
  <rect width="512" height="512" rx="96" fill="#0A1428"/>
  
  <!-- Score arc background (full semicircle, dim) -->
  <path d="M 96 320 A 160 160 0 0 1 416 320" 
        stroke="#00E5C0" stroke-width="8" fill="none" opacity="0.15" stroke-linecap="round"/>
  
  <!-- Score arc filled (showing ~75% = good score) -->
  <path d="M 96 320 A 160 160 0 0 1 380 190" 
        stroke="#00E5C0" stroke-width="8" fill="none" opacity="0.8" stroke-linecap="round"/>
  
  <!-- Score needle -->
  <line x1="256" y1="320" x2="368" y2="204" 
        stroke="#00E5C0" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Center pivot -->
  <circle cx="256" cy="320" r="10" fill="#00E5C0"/>
  <circle cx="256" cy="320" r="4" fill="#0A1428"/>
  
  <!-- The "A" letterform inside the gauge -->
  <text x="256" y="290" text-anchor="middle" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="120" font-weight="700" fill="#00E5C0" letter-spacing="-4">
    A
  </text>
  
  <!-- Subtle tick marks on the arc -->
  <line x1="106" y1="310" x2="116" y2="316" stroke="#00E5C0" stroke-width="2" opacity="0.3"/>
  <line x1="136" y1="244" x2="148" y2="252" stroke="#00E5C0" stroke-width="2" opacity="0.3"/>
  <line x1="196" y1="192" x2="206" y2="202" stroke="#00E5C0" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="162" x2="256" y2="174" stroke="#00E5C0" stroke-width="2" opacity="0.3"/>
  <line x1="316" y1="192" x2="306" y2="202" stroke="#00E5C0" stroke-width="2" opacity="0.3"/>
  <line x1="376" y1="244" x2="364" y2="252" stroke="#00E5C0" stroke-width="2" opacity="0.3"/>
  <line x1="406" y1="310" x2="396" y2="316" stroke="#00E5C0" stroke-width="2" opacity="0.3"/>
</svg>
