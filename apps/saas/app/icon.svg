<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0F2847"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00B4FF"/>
      <stop offset="100%" stop-color="#0077CC"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <g transform="translate(0, 20)">
    <g opacity="0.08" stroke="#00C4FF" stroke-width="0.5">
      <line x1="200" y1="60" x2="200" y2="300"/>
      <line x1="80" y1="180" x2="320" y2="180"/>
      <circle cx="200" cy="180" r="100" fill="none"/>
      <circle cx="200" cy="180" r="75" fill="none"/>
      <line x1="120" y1="100" x2="280" y2="260"/>
      <line x1="280" y1="100" x2="120" y2="260"/>
    </g>
    <circle cx="200" cy="180" r="95" fill="none" stroke="#00C4FF" stroke-width="0.6" opacity="0.2"/>
    <g stroke="#00C4FF" stroke-width="1.2" opacity="0.35" fill="none">
      <path d="M130,110 L130,100 L140,100"/>
      <path d="M270,110 L270,100 L260,100"/>
      <path d="M130,250 L130,260 L140,260"/>
      <path d="M270,250 L270,260 L260,260"/>
    </g>
    <g filter="url(#glow)" stroke="url(#blue)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M200,110 L155,250"/>
      <path d="M200,110 L245,250"/>
      <line x1="165" y1="200" x2="235" y2="200"/>
    </g>
    <g filter="url(#glow)" transform="translate(200,108)">
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#00B4FF" stroke-width="1.5"/>
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#00B4FF" stroke-width="1.5"/>
      <line x1="-8" y1="-8" x2="8" y2="8" stroke="#00B4FF" stroke-width="0.8"/>
      <line x1="8" y1="-8" x2="-8" y2="8" stroke="#00B4FF" stroke-width="0.8"/>
    </g>
    <circle cx="200" cy="175" r="70" fill="#00C4FF" opacity="0.04" filter="url(#softglow)"/>
  </g>
</svg>
