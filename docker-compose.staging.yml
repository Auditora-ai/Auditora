# =============================================================================
# Auditora.ai - Staging Environment
# =============================================================================
# Usage:
#   docker compose -f docker-compose.staging.yml up -d --build
#   docker compose -f docker-compose.staging.yml logs -f
#   docker compose -f docker-compose.staging.yml down
#
# First time setup:
#   1. Copy .env.example to .env.staging and fill in real values
#   2. docker compose -f docker-compose.staging.yml up -d --build
#   3. docker compose -f docker-compose.staging.yml exec saas npx prisma db push
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: auditora-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STAGING_DB_USER:-auditora}
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:-auditora-staging-secret}
      POSTGRES_DB: ${STAGING_DB_NAME:-auditora_staging}
    ports:
      - "${STAGING_DB_PORT:-5433}:5432"
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_DB_USER:-auditora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: auditora-staging-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin-staging}
    ports:
      - "${STAGING_MINIO_API_PORT:-9002}:9000"
      - "${STAGING_MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - staging_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging

  # Auto-create buckets on first start
  minio-setup:
    image: minio/mc:latest
    container_name: auditora-staging-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY_ID:-minioadmin} $${S3_SECRET_ACCESS_KEY:-minioadmin-staging};
      mc mb local/avatars --ignore-existing;
      mc mb local/documents --ignore-existing;
      mc anonymous set download local/avatars;
      mc anonymous set download local/documents;
      echo 'Staging buckets created';
      exit 0;
      "
    networks:
      - staging

  # ---------------------------------------------------------------------------
  # Redis (for rate limiting, optional but recommended)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: auditora-staging-redis
    restart: unless-stopped
    ports:
      - "${STAGING_REDIS_PORT:-6380}:6379"
    volumes:
      - staging_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging

  # ---------------------------------------------------------------------------
  # SaaS App (main application)
  # ---------------------------------------------------------------------------
  saas:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: saas
    container_name: auditora-staging-saas
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${STAGING_SAAS_PORT:-3000}:3000"
    env_file:
      - path: .env.staging
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${STAGING_DB_USER:-auditora}:${STAGING_DB_PASSWORD:-auditora-staging-secret}@postgres:5432/${STAGING_DB_NAME:-auditora_staging}?schema=public
      DIRECT_URL: postgresql://${STAGING_DB_USER:-auditora}:${STAGING_DB_PASSWORD:-auditora-staging-secret}@postgres:5432/${STAGING_DB_NAME:-auditora_staging}?schema=public
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin-staging}
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_SAAS_URL: ${NEXT_PUBLIC_SAAS_URL:-http://localhost:3000}
      NEXT_PUBLIC_MARKETING_URL: ${NEXT_PUBLIC_MARKETING_URL:-http://localhost:3001}
      NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-http://localhost:3002}
      NEXT_PUBLIC_AVATARS_BUCKET_NAME: avatars
      NEXT_PUBLIC_DOCUMENTS_BUCKET_NAME: documents
    networks:
      - staging

  # ---------------------------------------------------------------------------
  # Marketing Site
  # ---------------------------------------------------------------------------
  marketing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: marketing
    container_name: auditora-staging-marketing
    restart: unless-stopped
    ports:
      - "${STAGING_MARKETING_PORT:-3001}:3000"
    env_file:
      - path: .env.staging
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SAAS_URL: ${NEXT_PUBLIC_SAAS_URL:-http://localhost:3000}
      NEXT_PUBLIC_MARKETING_URL: ${NEXT_PUBLIC_MARKETING_URL:-http://localhost:3001}
      NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-http://localhost:3002}
    networks:
      - staging

  # ---------------------------------------------------------------------------
  # Docs Site
  # ---------------------------------------------------------------------------
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: docs
    container_name: auditora-staging-docs
    restart: unless-stopped
    ports:
      - "${STAGING_DOCS_PORT:-3002}:3000"
    env_file:
      - path: .env.staging
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SAAS_URL: ${NEXT_PUBLIC_SAAS_URL:-http://localhost:3000}
      NEXT_PUBLIC_MARKETING_URL: ${NEXT_PUBLIC_MARKETING_URL:-http://localhost:3001}
      NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-http://localhost:3002}
    networks:
      - staging

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  staging_postgres_data:
    driver: local
  staging_minio_data:
    driver: local
  staging_redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  staging:
    driver: bridge
