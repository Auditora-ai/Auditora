name: Deploy Staging (Vercel)

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID_SAAS: ${{ secrets.VERCEL_PROJECT_ID_SAAS }}
  VERCEL_PROJECT_ID_MARKETING: ${{ secrets.VERCEL_PROJECT_ID_MARKETING }}
  VERCEL_PROJECT_ID_DOCS: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Type Check
  # ---------------------------------------------------------------------------
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @repo/database generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Deploy SaaS to Vercel (staging/preview)
  # ---------------------------------------------------------------------------
  deploy-saas:
    name: Deploy SaaS
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/saas
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        working-directory: apps/saas
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        working-directory: apps/saas
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /tmp/saas-url.txt

      - name: Output SaaS URL
        run: |
          echo "SaaS Preview URL: $(cat /tmp/saas-url.txt | tail -1)"

  # ---------------------------------------------------------------------------
  # Deploy Marketing to Vercel
  # ---------------------------------------------------------------------------
  deploy-marketing:
    name: Deploy Marketing
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/marketing
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        working-directory: apps/marketing
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        working-directory: apps/marketing
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /tmp/marketing-url.txt

      - name: Output Marketing URL
        run: |
          echo "Marketing Preview URL: $(cat /tmp/marketing-url.txt | tail -1)"

  # ---------------------------------------------------------------------------
  # Deploy Docs to Vercel
  # ---------------------------------------------------------------------------
  deploy-docs:
    name: Deploy Docs
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/docs
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        working-directory: apps/docs
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        working-directory: apps/docs
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /tmp/docs-url.txt

      - name: Output Docs URL
        run: |
          echo "Docs Preview URL: $(cat /tmp/docs-url.txt | tail -1)"

  # ---------------------------------------------------------------------------
  # Post-deploy: push DB schema
  # ---------------------------------------------------------------------------
  post-deploy:
    name: Post-deploy checks
    needs: [deploy-saas, deploy-marketing, deploy-docs]
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          echo "All 3 apps deployed successfully!"
          echo "Run 'prisma db push' manually if schema changed."
